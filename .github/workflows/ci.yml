name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']
    name: test (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # No runtime or dev dependencies — the test suite is Node's built-in
      # test runner over the pure parser, so there is nothing to `npm install`.
      - name: Run tests
        run: npm test
